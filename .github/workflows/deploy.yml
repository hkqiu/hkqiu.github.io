# 使用 GitHub 官方「Actions → Pages」发布，无需 gh-pages 分支。
# 仓库 Settings → Pages → Build and deployment：Source 选「GitHub Actions」。

name: Deploy site to Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # rmagick（jekyll-responsive-image）在 bundle install 时就要链接 ImageMagick，必须先装系统库
      - name: Install ImageMagick (for rmagick / jekyll-responsive-image)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libmagickwand-dev imagemagick

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Mermaid CLI (jekyll-diagrams)
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build Jekyll
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
